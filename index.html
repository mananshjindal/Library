<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" class="css" />
  </head>
  <body>
    <main>
      <!-- Add Button -->
      <div class="add-book-container">
        <button class="add-book-button">Add Book</button>
        <dialog class="add-book-dialog">
          <form>
            <input id="title" name="title" type="text" placeholder="Title" />
            <input id="author" name="author" type="text" placeholder="Author" />
            <input id="pages" name="pages" type="number" placeholder="Pages" />
            <div class="checkbox-container">
              <input name="read" type="checkbox" id="read" value="true" />
              <label for="read">Read</label>
            </div>
            <button type="submit" class="add-book">Add Book</button>
          </form>
          <button class="cancel">Cancel</button>
        </dialog>
      </div>
      <!-- Books Container -->
      <div class="books-container"></div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
